<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Station Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased">

    <div class="max-w-4xl mx-auto py-12 px-6">
        <header class="mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">
                <span class="text-emerald-500">⚡</span> EV Charger Finder
            </h1>
            <p class="text-slate-400">Enter a street address to locate the 10 nearest charging stations.</p>
        </header>

        <div class="flex flex-col md:flex-row gap-3 mb-10">
            <input type="text" id="addressInput" 
                   placeholder="e.g. 10 Downing St, London or 1600 Amphitheatre Pkwy, CA" 
                   class="flex-1 p-4 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition text-lg">
            
            <button onclick="findChargers()" 
                    class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 px-8 rounded-lg transition-all shadow-lg active:scale-95">
                Search Address
            </button>
            
            <button onclick="useMyLocation()" 
                    class="bg-slate-800 hover:bg-slate-700 text-slate-200 py-4 px-4 rounded-lg transition border border-slate-600"
                    title="Use Current Location">
                📍
            </button>
        </div>

        <div id="status" class="hidden mb-4 p-4 rounded bg-slate-900 border border-slate-800 text-slate-400 italic"></div>
        
        <div id="results" class="grid grid-cols-1 gap-4 custom-scrollbar"></div>
    </div>

    <script>
        const OCM_KEY = 'd17150ab-e6b7-427c-a03b-af2e9b47cbd1';

        function setStatus(msg, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = msg;
            statusDiv.className = isError ? "mb-4 p-4 rounded bg-red-900/20 border border-red-800 text-red-300" : "mb-4 p-4 rounded bg-slate-900 border border-slate-800 text-slate-400 italic";
        }

        async function useMyLocation() {
            if (!navigator.geolocation) return setStatus("Geolocation is not supported by your browser.", true);
            setStatus("Getting your GPS coordinates...");
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchFromCoords(pos.coords.latitude, pos.coords.longitude),
                () => setStatus("Location access denied.", true)
            );
        }

        async function findChargers() {
            const address = document.getElementById('addressInput').value;
            if (!address) return setStatus("Please enter an address first.", true);
            
            setStatus("Geocoding address...");
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const geoData = await geoRes.json();
                if (!geoData.length) throw new Error("Could not find that address. Try adding a city or zip code.");
                
                fetchFromCoords(geoData[0].lat, geoData[0].lon);
            } catch (err) {
                setStatus(err.message, true);
            }
        }

        async function fetchFromCoords(lat, lon) {
            setStatus("Fetching nearest chargers...");
            try {
                const url = `https://api.openchargemap.io/v3/poi/?key=${OCM_KEY}&latitude=${lat}&longitude=${lon}&distance=25&distanceunit=KM&maxresults=10&compact=false&verbose=true`;
                const response = await fetch(url);
                const data = await response.json();
                renderResults(data);
            } catch (err) {
                setStatus("Failed to reach Open Charge Map.", true);
            }
        }

        function getStatusBadge(statusType) {
            const status = statusType ? statusType.Title.toLowerCase() : 'unknown';
            
            if (status.includes('available')) {
                return `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Available</span>`;
            } else if (status.includes('use') || status.includes('operational')) {
                return `<span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">In Use</span>`;
            } else if (status.includes('broken') || status.includes('out of service')) {
                return `<span class="bg-red-500/10 text-red-400 border border-red-800/20 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Offline</span>`;
            } else {
                return `<span class="bg-slate-800 text-slate-500 border border-slate-700 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Unknown Status</span>`;
            }
        }

        function renderResults(chargers) {
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            
            if (!chargers.length) {
                statusDiv.innerHTML = "No chargers found within 25km of that location.";
                resultsDiv.innerHTML = "";
                return;
            }

            statusDiv.classList.add('hidden');
            resultsDiv.innerHTML = chargers.map(poi => {
                const statusHtml = getStatusBadge(poi.StatusType);
                const operatorName = (poi.OperatorInfo && poi.OperatorInfo.Title && poi.OperatorInfo.Title !== "(Unknown Operator)") 
                                     ? poi.OperatorInfo.Title 
                                     : "Independent Network";

                return `
                <div class="group bg-slate-900 border border-slate-800 p-6 rounded-xl hover:border-emerald-500/50 transition-all shadow-sm flex flex-col md:flex-row justify-between items-start">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-3">
                            ${statusHtml}
                            <span class="text-emerald-500 text-xs font-semibold px-2 py-0.5 bg-emerald-500/5 rounded border border-emerald-500/10 italic">
                                ${operatorName}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-white group-hover:text-emerald-400 transition leading-tight">${poi.AddressInfo.Title}</h3>
                        <p class="text-slate-400 mt-1 text-sm italic">${poi.AddressInfo.AddressLine1 || ''}, ${poi.AddressInfo.Town || ''}</p>
                        
                        <div class="flex items-center gap-4 mt-6">
                             <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">
                                📍 ${poi.AddressInfo.Distance.toFixed(1)} KM Away
                            </p>
                        </div>
                    </div>
                    <div class="mt-6 md:mt-0 md:ml-4 self-stretch md:self-start">
                        <a href="https://www.google.com/maps/search/?api=1&query=${poi.AddressInfo.Latitude},${poi.AddressInfo.Longitude}" 
                           target="_blank" 
                           class="inline-block w-full text-center bg-slate-800 hover:bg-emerald-600 text-white text-xs font-bold py-3 px-5 rounded-lg transition-all shadow-md whitespace-nowrap">
                            GET DIRECTIONS
                        </a>
                    </div>
                </div>
            `}).join('');
        }
    </script>
</body>
</html>
