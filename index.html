<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Station Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased">

    <div class="max-w-4xl mx-auto py-12 px-6">
        <header class="mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">
                <span class="text-emerald-500">⚡</span> EV Charger Finder
            </h1>
            <p class="text-slate-400">Locate the nearest chargers and compatible plug types.</p>
        </header>

        <div class="flex flex-col md:flex-row gap-3 mb-10">
            <input type="text" id="addressInput" 
                   placeholder="e.g. 10 Downing St, London or 1600 Amphitheatre Pkwy, CA" 
                   class="flex-1 p-4 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition text-lg">
            
            <button onclick="findChargers()" 
                    class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 px-8 rounded-lg transition-all shadow-lg active:scale-95">
                Search Address
            </button>
            
            <button onclick="useMyLocation()" 
                    class="bg-slate-800 hover:bg-slate-700 text-slate-200 py-4 px-4 rounded-lg transition border border-slate-600"
                    title="Use Current Location">
                📍
            </button>
        </div>

        <div id="status" class="hidden mb-4 p-4 rounded bg-slate-900 border border-slate-800 text-slate-400 italic"></div>
        
        <div id="results" class="grid grid-cols-1 gap-4 custom-scrollbar"></div>
    </div>

    <script>
        const OCM_KEY = '4741d94f-5891-4220-bf74-153df247627e';

        function setStatus(msg, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = msg;
            statusDiv.className = isError ? "mb-4 p-4 rounded bg-red-900/20 border border-red-800 text-red-300" : "mb-4 p-4 rounded bg-slate-900 border border-slate-800 text-slate-400 italic";
        }

        async function useMyLocation() {
            if (!navigator.geolocation) return setStatus("Geolocation is not supported.", true);
            setStatus("Getting location...");
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchFromCoords(pos.coords.latitude, pos.coords.longitude),
                () => setStatus("Location access denied.", true)
            );
        }

        async function findChargers() {
            const address = document.getElementById('addressInput').value;
            if (!address) return setStatus("Please enter an address.", true);
            setStatus("Geocoding...");
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const geoData = await geoRes.json();
                if (!geoData.length) throw new Error("Address not found.");
                fetchFromCoords(geoData[0].lat, geoData[0].lon);
            } catch (err) { setStatus(err.message, true); }
        }

        async function fetchFromCoords(lat, lon) {
            setStatus("Fetching chargers...");
            try {
                // Ensure output=json is set and standard params are used
                const url = `https://api.openchargemap.io/v3/poi/?key=${OCM_KEY}&latitude=${lat}&longitude=${lon}&distance=25&distanceunit=KM&maxresults=15&compact=true&verbose=false&output=json`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': OCM_KEY
                    }
                });

                if (!response.ok) throw new Error("API Limit reached or invalid key.");
                
                const text = await response.text();
                if (!text) throw new Error("Empty response from API.");
                
                const data = JSON.parse(text);
                renderResults(data);
            } catch (err) { 
                setStatus("Error: " + err.message, true); 
            }
        }

        function getStatusBadge(statusType) {
            const status = statusType ? statusType.Title.toLowerCase() : 'unknown';
            if (status.includes('available')) return `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Available</span>`;
            if (status.includes('use') || status.includes('operational')) return `<span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Operational</span>`;
            return `<span class="bg-slate-800 text-slate-500 border border-slate-700 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Offline</span>`;
        }

        function renderResults(chargers) {
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            
            if (!chargers.length) {
                statusDiv.innerHTML = "No chargers found nearby.";
                resultsDiv.innerHTML = "";
                return;
            }

            statusDiv.classList.add('hidden');
            resultsDiv.innerHTML = chargers.map(poi => {
                const statusHtml = getStatusBadge(poi.StatusType);
                const operatorName = (poi.OperatorInfo?.Title && poi.OperatorInfo.Title !== "(Unknown Operator)") 
                                     ? poi.OperatorInfo.Title : "Independent";

                const connections = poi.Connections ? poi.Connections.map(conn => {
                    const title = conn.ConnectionType?.Title || "Unknown Plug";
                    const kw = conn.PowerKW ? `${conn.PowerKW}kW` : "";
                    return `<span class="bg-slate-800 text-slate-200 px-2 py-1 rounded text-[10px] border border-slate-700 font-medium">🔌 ${title} ${kw}</span>`;
                }).join(' ') : "No plug data";

                // Corrected Google Maps Link Construction
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${poi.AddressInfo.Latitude},${poi.AddressInfo.Longitude}`;

                return `
                <div class="group bg-slate-900 border border-slate-800 p-6 rounded-xl hover:border-emerald-500/50 transition-all shadow-sm flex flex-col md:flex-row justify-between items-start">
                    <div class="flex-1">
                        <div class="flex flex-wrap items-center gap-2 mb-3">
                            ${statusHtml}
                            <span class="text-emerald-500 text-[10px] font-semibold px-2 py-0.5 bg-emerald-500/5 rounded border border-emerald-500/10 uppercase tracking-widest">
                                ${operatorName}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-white group-hover:text-emerald-400 transition leading-tight">${poi.AddressInfo.Title}</h3>
                        <p class="text-slate-400 mt-1 text-sm italic">${poi.AddressInfo.AddressLine1 || ''}</p>
                        
                        <div class="flex flex-wrap gap-2 mt-4">
                            ${connections}
                        </div>

                        <div class="flex items-center gap-4 mt-6">
                             <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">
                                📍 ${poi.AddressInfo.Distance ? poi.AddressInfo.Distance.toFixed(1) : '0'} KM Away
                             </p>
                        </div>
                    </div>
                    <div class="mt-6 md:mt-0 md:ml-4 self-stretch md:self-start">
                        <a href="${mapsUrl}" 
                           target="_blank" 
                           class="inline-block w-full text-center bg-slate-800 hover:bg-emerald-600 text-white text-xs font-bold py-3 px-5 rounded-lg transition-all shadow-md">
                            DIRECTIONS
                        </a>
                    </div>
                </div>
            `}).join('');
        }
    </script>
</body>
</html>
